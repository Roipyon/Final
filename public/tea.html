<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>教学管理系统</title>
    <link rel="stylesheet" href="/css/tea.css">
</head>
<body>
<div class="main-layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <h3>班主任中心</h3>
        </div>
        <ul class="sidebar-menu">
            <li><a href="javascript:void(0)" data-nav="home" class="active">教学首页</a></li>
            <li><a href="javascript:void(0)" data-nav="score">成绩管理</a></li>
            <li><a href="javascript:void(0)" data-nav="notice">班级通知</a></li>
            <li><a href="javascript:void(0)" data-nav="log">班级日志</a></li>
        </ul>
    </aside>
    <div class="content-wrapper">
        <header class="header">
            <div class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('show')">☰</div>
            <div class="page-title" id="pageTitle">教学首页</div>
            <div class="user-info">
                <div class="user-avatar">王</div>
                <span>王敏老师 (班主任)</span>
                <button class="btn-sm" id="logoutBtn">退出</button>
            </div>
        </header>
        <main class="main-content">
            <div class="card section active" id="homeSection"></div>
            <div class="card section" id="scoreSection"></div>
            <div class="card section" id="noticeSection"></div>
            <div class="card section" id="logSection"></div>
        </main>
        <!-- 编辑成绩模态框 -->
        <div id="editScoreModal" class="modal-mask" style="display:none;">
            <div class="modal-container">
                <h3 style="margin-bottom: 16px;">修改成绩</h3>
                <div class="form-group">
                    <label>学生姓名</label>
                    <input type="text" id="editStudentName" readonly style="background:#f5f7fa;">
                </div>
                <div class="form-group">
                    <label>科目</label>
                    <input type="text" id="editSubject" readonly style="background:#f5f7fa;">
                </div>
                <div class="form-group">
                    <label>新成绩</label>
                    <input type="number" id="editScore" placeholder="0-100" step="1">
                </div>
                <div class="flex-btns">
                    <button id="editModalCancelBtn" class="btn-default">取消</button>
                    <button id="editModalConfirmBtn" class="btn-primary">确认修改</button>
                </div>
            </div>
        </div>
        <!-- 编辑通知模态框 -->
        <div id="editNoticeModal" class="modal-mask" style="display:none;">
            <div class="modal-container">
                <h3>编辑通知</h3>
                <div class="form-group">
                    <label>标题</label>
                    <input type="text" id="editNoticeTitle" placeholder="通知标题">
                </div>
                <div class="form-group">
                    <label>内容</label>
                    <textarea id="editNoticeContent" rows="4" style="width:100%;"></textarea>
                </div>
                <div class="flex-btns">
                    <button id="editNoticeCancelBtn" class="btn-default">取消</button>
                    <button id="editNoticeConfirmBtn" class="btn-primary">保存修改</button>
                </div>
            </div>
        </div>
        <!-- 已读/未读名单模态框 -->
        <div id="readStatusModal" class="modal-mask" style="display:none;">
            <div class="modal-container" style="width: 500px; max-width: 90%;">
                <h3>通知阅读状态</h3>
                <div style="display: flex; gap: 20px; margin-top: 16px;">
                    <div style="flex: 1;">
                        <h4>已读学生 (<span id="readCount">0</span>)</h4>
                        <ul id="readList" style="max-height: 300px; overflow-y: auto; padding-left: 20px;"></ul>
                    </div>
                    <div style="flex: 1;">
                        <h4>未读学生 (<span id="unreadCount">0</span>)</h4>
                        <ul id="unreadList" style="max-height: 300px; overflow-y: auto; padding-left: 20px;"></ul>
                    </div>
                </div>
                <div class="flex-btns" style="margin-top: 20px;">
                    <button id="closeReadStatusModal" class="btn-default">关闭</button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
<script src="/js/common/utils.js"></script>
<script src="/js/common/api.js"></script>
<script type="module" src="/js/teacher/main.js"></script>
</html>
