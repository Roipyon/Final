<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>教学管理系统</title>
    <link rel="stylesheet" href="adm.css">
</head>
<body>
<div class="main-layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <h3>教务管理中心</h3>
        </div>
        <ul class="sidebar-menu">
            <li><a href="javascript:void(0)" data-nav="dashboard" class="active">总览看板</a></li>
            <li><a href="javascript:void(0)" data-nav="classManage">班级管理</a></li>
            <li><a href="javascript:void(0)" data-nav="scoreAll">全量成绩</a></li>
            <li><a href="javascript:void(0)" data-nav="noticeAll">全量通知</a></li>
            <li><a href="javascript:void(0)" data-nav="systemLog">系统日志</a></li>
        </ul>
    </aside>
    <div class="content-wrapper">
        <header class="header">
            <div class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('show')">☰</div>
            <div class="page-title" id="pageTitle">总览看板</div>
            <div class="user-info">
                <div class="user-avatar">张</div>
                <span>张宏主任 (教务主任)</span>
                <button class="btn-sm" id="logoutBtn">退出</button>
            </div>
        </header>
        <main class="main-content">
            <div class="card section active" id="dashboardSection"></div>
            <div class="card section" id="classManageSection"></div>
            <div class="card section" id="scoreAllSection"></div>
            <div class="card section" id="noticeAllSection"></div>
            <div class="card section" id="systemLogSection"></div>
        </main>
        <!-- 新增班级模态框 -->
        <div id="addClassModal" class="modal-mask" style="display:none;">
            <div class="modal-container">
                <h3>新增班级</h3>
                <div class="form-group">
                    <label>年级</label>
                    <select id="addClassGradeId" class="filter-select"></select>
                </div>
                <div class="form-group">
                    <label>班级名称（纯数字+班，如：1班）</label>
                    <input type="text" id="addClassName" placeholder="例如：1班">
                </div>
                <div class="flex-btns">
                    <button class="btn-default" id="cancelAddClassBtn">取消</button>
                    <button class="btn-primary" id="confirmAddClassBtn">确认添加</button>
                </div>
            </div>
        </div>
        <!-- 编辑班级模态框 -->
        <div id="editClassModal" class="modal-mask" style="display:none;">
            <div class="modal-container">
                <h3>编辑班级</h3>
                <div class="form-group">
                    <label>年级</label>
                    <select id="editClassGradeId" class="filter-select"></select>
                </div>
                <div class="form-group">
                    <label>班级名称（纯数字+班）</label>
                    <input type="text" id="editClassName">
                </div>
                <div class="flex-btns">
                    <button class="btn-default" id="cancelEditClassBtn">取消</button>
                    <button class="btn-primary" id="confirmEditClassBtn">保存</button>
                </div>
            </div>
        </div>
        <!-- 添加学生模态框 -->
        <div id="addStudentModal" class="modal-mask" style="display:none;">
            <div class="modal-container">
                <h3>添加学生</h3>
                <div class="form-group">
                    <label>学生姓名</label>
                    <input type="text" id="studentName" placeholder="请输入姓名">
                </div>
                <div class="form-group">
                    <label>学号</label>
                    <input type="text" id="studentId" placeholder="请输入学号">
                </div>
                <div class="flex-btns">
                    <button class="btn-default" id="cancelAddStudentBtn">取消</button>
                    <button class="btn-primary" id="confirmAddStudentBtn">确认添加</button>
                </div>
            </div>
        </div>
        <!-- 添加教师模态框 -->
        <div id="addTeacherModal" class="modal-mask" style="display:none;">
            <div class="modal-container">
                <h3>添加教师</h3>
                <div class="form-group">
                    <label>教师姓名</label>
                    <input type="text" id="teacherName" placeholder="请输入姓名">
                </div>
                <div class="flex-btns">
                    <button class="btn-default" id="cancelAddTeacherBtn">取消</button>
                    <button class="btn-primary" id="confirmAddTeacherBtn">确认添加</button>
                </div>
            </div>
        </div>
       <!-- 添加成绩模态框 -->
        <div id="addScoreModal" class="modal-mask" style="display:none;">
            <div class="modal-container">
                <h3>添加成绩</h3>
                <div class="form-group">
                    <label>班级</label>
                    <select id="addScoreClass" class="filter-select"></select>
                </div>
                <div class="form-group">
                    <label>学生姓名</label>
                    <input type="text" id="addScoreStudentName" placeholder="请输入学生姓名">
                </div>
                <div class="form-group">
                    <label>学号</label>
                    <input type="text" id="addScoreStudentId" placeholder="请输入学号">
                </div>
                <div class="form-group">
                    <label>科目</label>
                    <input type="text" id="addScoreSubject" list="subjectOptions" placeholder="选择或输入科目">
                    <datalist id="subjectOptions"></datalist>
                </div>
                <div class="form-group">
                    <label>成绩</label>
                    <input type="number" id="addScoreValue" placeholder="0-100" step="1">
                </div>
                <div class="flex-btns">
                    <button class="btn-default" id="cancelAddScoreBtn">取消</button>
                    <button class="btn-primary" id="confirmAddScoreBtn">确认添加</button>
                </div>
            </div>
        </div>
        <!-- 编辑成绩模态框 -->
        <div id="editScoreAdminModal" class="modal-mask" style="display:none;">
            <div class="modal-container">
                <h3>编辑成绩</h3>
                <div class="form-group">
                    <label>学生姓名</label>
                    <input type="text" id="editScoreStudentName" readonly style="background:#f5f7fa;">
                </div>
                <div class="form-group">
                    <label>科目</label>
                    <input type="text" id="editScoreSubject" readonly style="background:#f5f7fa;">
                </div>
                <div class="form-group">
                    <label>新成绩</label>
                    <input type="number" id="editScoreValue" placeholder="0-100" step="1">
                </div>
                <div class="flex-btns">
                    <button class="btn-default" id="cancelEditScoreAdminBtn">取消</button>
                    <button class="btn-primary" id="confirmEditScoreAdminBtn">保存</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="adm.js"></script>
</body>
</html>
