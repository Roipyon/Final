<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>教学管理系统</title>
    <link rel="stylesheet" href="tea.css">
</head>
<body>
<div class="main-layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <h3>班主任中心</h3>
        </div>
        <ul class="sidebar-menu">
            <li><a href="javascript:void(0)" data-nav="home" class="active">教学首页</a></li>
            <li><a href="javascript:void(0)" data-nav="score">成绩管理</a></li>
            <li><a href="javascript:void(0)" data-nav="notice">班级通知</a></li>
            <li><a href="javascript:void(0)" data-nav="log">班级日志</a></li>
        </ul>
    </aside>
    <div class="content-wrapper">
        <header class="header">
            <div class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('show')">☰</div>
            <div class="page-title" id="pageTitle">教学首页</div>
            <div class="user-info">
                <div class="user-avatar">王</div>
                <span>王敏老师 (班主任)</span>
                <button class="btn-sm" id="logoutBtn">退出</button>
            </div>
        </header>
        <main class="main-content">
            <div class="card section active" id="homeSection"></div>
            <div class="card section" id="scoreSection"></div>
            <div class="card section" id="noticeSection"></div>
            <div class="card section" id="logSection"></div>
        </main>
    </div>
</div>
<script src="tea.js"></script>
</body>
</html>
